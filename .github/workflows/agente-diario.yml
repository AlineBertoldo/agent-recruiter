name: Busca Diaria de Vagas

on:
  schedule:
    # Roda de segunda a sexta, às 09:00 da manhã (UTC)
    - cron: '0 9 * * 1-5'
  workflow_dispatch: # Cria o botão para rodar manualmente lá no GitHub

jobs:
  rodar-agente:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Preparar ambiente (Node.js)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm install 

      - name: Executar o Agente
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }} 
        run: npm start